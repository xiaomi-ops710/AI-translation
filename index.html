<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Translation Suite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent-color: #2563eb;
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --input-bg: #0f172a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- iPad専用 左サイドバーレイアウト --- */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px 16px;
            flex-shrink: 0;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 700;
            padding-left: 12px;
            margin-bottom: 32px;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }

        /* ボタンを大きく、タップしやすく最適化 */
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 16px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            width: 100%;
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
        }

        .nav-btn.active {
            background-color: var(--accent-color);
            color: #ffffff;
        }

        /* --- メインコンテンツエリア --- */
        .main-content {
            flex-grow: 1;
            height: 100%;
            overflow-y: auto;
            position: relative;
            padding: 40px;
        }

        .app-section {
            display: none;
            height: 100%;
            animation: fadeIn 0.3s ease;
        }

        .app-section.active {
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 24px;
        }

        /* --- 翻訳画面（超高速リアルタイム仕様） --- */
        .lang-selector-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        select {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
        }

        .swap-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 10px;
        }

        .translation-grid {
            display: grid;
            grid-template-columns: 1xl;
            gap: 20px;
            flex-grow: 1;
        }

        @media (min-width: 768px) {
            .translation-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .textarea-wrapper {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 100%;
            min-height: 250px;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.2rem;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .textarea-wrapper .status-bar {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .save-toast-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.3rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .save-toast-btn.saved {
            color: #eab308;
        }

        /* --- 設定画面（アクセントカラー変更など） --- */
        .settings-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .settings-group {
            margin-bottom: 20px;
        }

        .settings-group label {
            display: block;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-muted);
        }

        input[type="text"] {
            width: 100%;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 14px;
            font-size: 1rem;
            border-radius: 8px;
            outline: none;
        }

        /* カラーパレット */
        .color-palette {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .color-dot {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s;
        }

        .color-dot:hover {
            transform: scale(1.1);
        }

        .color-dot.active {
            border-color: #ffffff;
        }

        /* --- リスト（履歴・保存済み）スタイル --- */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .list-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 12px;
        }

        .list-item .meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .list-item .original {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .list-item .translated {
            color: var(--text-muted);
        }

        /* --- 右下常駐型 AIチャット --- */
        .chat-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .chat-trigger {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .chat-trigger:hover {
            transform: scale(1.05);
        }

        .chat-window {
            display: none;
            width: 360px;
            height: 500px;
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            margin-bottom: 16px;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.2s ease;
        }

        .chat-window.open {
            display: flex;
        }

        .chat-header {
            background-color: rgba(0,0,0,0.1);
            padding: 16px;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .msg.user {
            background-color: var(--accent-color);
            color: white;
            align-self: flex-end;
        }

        .msg.ai {
            background-color: var(--bg-color);
            color: var(--text-color);
            align-self: flex-start;
        }

        .chat-input-area {
            padding: 12px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
        }

        .chat-input-area input {
            flex-grow: 1;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px;
            border-radius: 8px;
            outline: none;
        }

        .chat-send-btn {
            background-color: var(--accent-color);
            border: none;
            color: white;
            padding: 0 16px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-menu">
            <div class="brand"><i class="fa-solid fa-language"></i> AI Trans</div>
            <button class="nav-btn active" data-target="translate"><i class="fa-solid fa-language"></i> 翻訳</button>
            <button class="nav-btn" data-target="history"><i class="fa-solid fa-history"></i> 履歴</button>
            <button class="nav-btn" data-target="saved"><i class="fa-solid fa-bookmark"></i> 保存済み</button>
            <button class="nav-btn" data-target="settings"><i class="fa-solid fa-gear"></i> 設定</button>
        </div>
    </div>

    <div class="main-content">
        
        <div id="translate" class="app-section active">
            <div class="lang-selector-bar">
                <select id="source-lang">
                    <option value="English">英語</option>
                    <option value="Japanese" selected>日本語</option>
                    <option value="Chinese">中国語</option>
                    <option value="Korean">韓国語</option>
                </select>
                <button class="swap-btn" id="swap-lang-btn"><i class="fa-solid fa-arrows-rotate"></i></button>
                <select id="target-lang">
                    <option value="English" selected>英語</option>
                    <option value="Japanese">日本語</option>
                    <option value="Chinese">中国語</option>
                    <option value="Korean">韓国語</option>
                </select>
            </div>
            <div class="translation-grid">
                <div class="textarea-wrapper">
                    <textarea id="input-text" placeholder="ここに文字を入力するとリアルタイムで翻訳されます..."></textarea>
                </div>
                <div class="textarea-wrapper">
                    <textarea id="output-text" readonly placeholder="翻訳結果"></textarea>
                    <div class="status-bar">
                        <button class="save-toast-btn" id="save-current-btn"><i class="fa-regular fa-bookmark"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div id="history" class="app-section">
            <h2>翻訳履歴</h2>
            <div class="list-container" id="history-list"></div>
        </div>

        <div id="saved" class="app-section">
            <h2>保存済みアイテム</h2>
            <div class="list-container" id="saved-list"></div>
        </div>

        <div id="settings" class="app-section">
            <h2>設定</h2>
            <div class="settings-card">
                <div class="settings-group">
                    <label for="api-key-input">Gemini API キー</label>
                    <input type="text" id="api-key-input" placeholder="AI Studioで取得したAPIキーを入力">
                </div>
            </div>
            <div class="settings-card">
                <div class="settings-group">
                    <label>アクセントカラーの変更</label>
                    <div class="color-palette">
                        <div class="color-dot" style="background-color: #2563eb;" data-color="#2563eb"></div>
                        <div class="color-dot" style="background-color: #ec4899;" data-color="#ec4899"></div>
                        <div class="color-dot" style="background-color: #10b981;" data-color="#10b981"></div>
                        <div class="color-dot" style="background-color: #f59e0b;" data-color="#f59e0b"></div>
                        <div class="color-dot" style="background-color: #8b5cf6;" data-color="#8b5cf6"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-widget">
        <div class="chat-window" id="chat-window">
            <div class="chat-header">
                <span>AI アシスタント</span>
                <span style="cursor:pointer;" id="close-chat"><i class="fa-solid fa-xmark"></i></span>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="msg ai">こんにちは！何かお手伝いできることはありますか？</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="メッセージを入力...">
                <button class="chat-send-btn" id="chat-send-btn">送信</button>
            </div>
        </div>
        <button class="chat-trigger" id="chat-trigger"><i class="fa-regular fa-comment-dots"></i></button>
    </div>

    <script>
        // --- 状態管理 & ローカルストレージ ---
        const state = {
            apiKey: localStorage.getItem('gemini_api_key') || '',
            accentColor: localStorage.getItem('accent_color') || '#2563eb',
            history: JSON.parse(localStorage.getItem('trans_history')) || [],
            saved: JSON.parse(localStorage.getItem('trans_saved')) || []
        };

        // --- 初期設定適用 ---
        document.getElementById('api-key-input').value = state.apiKey;
        applyAccentColor(state.accentColor);

        // --- サイドバー画面切り替え ---
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
                
                btn.classList.add('active');
                const target = btn.getAttribute('data-target');
                document.getElementById(target).classList.add('active');

                if(target === 'history') renderHistory();
                if(target === 'saved') renderSaved();
            });
        });

        // --- アクセントカラーの変更機能 ---
        function applyAccentColor(color) {
            document.documentElement.style.setProperty('--accent-color', color);
            state.accentColor = color;
            localStorage.setItem('accent_color', color);
            document.querySelectorAll('.color-dot').forEach(dot => {
                dot.classList.toggle('active', dot.getAttribute('data-color') === color);
            });
        }

        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                applyAccentColor(dot.getAttribute('data-color'));
            });
        });

        // APIキーのリアルタイム保存
        document.getElementById('api-key-input').addEventListener('input', (e) => {
            state.apiKey = e.target.value.trim();
            localStorage.setItem('gemini_api_key', state.apiKey);
        });

        // --- 超高速リアルタイム翻訳ロジック (Google翻訳仕様) ---
        let debounceTimeout;
        let abortController = null;

        const inputText = document.getElementById('input-text');
        const outputText = document.getElementById('output-text');

        inputText.addEventListener('input', () => {
            clearTimeout(debounceTimeout);
            
            // 入力が空なら即時クリア
            if (!inputText.value.trim()) {
                outputText.value = '';
                return;
            }

            // タイピングが止まって250ms後に翻訳実行（高速タイピングに対応）
            debounceTimeout = setTimeout(() => {
                executeTranslation();
            }, 250);
        });

        async function executeTranslation() {
            const text = inputText.value.trim();
            if (!text) return;

            if (!state.apiKey) {
                outputText.value = "【エラー】「設定」タブからGemini APIキーを入力してください。";
                return;
            }

            // 先行して走っている古いリクエストがあれば即時強制終了（高速化の肝）
            if (abortController) abortController.abort();
            abortController = new AbortController();

            const sourceLang = document.getElementById('source-lang').value;
            const targetLang = document.getElementById('target-lang').value;

            // 超高速応答のために「gemini-1.5-flash」をダイレクトに使用
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${state.apiKey}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    signal: abortController.signal,
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `You are an expert translator. Translate this text from ${sourceLang} to ${targetLang}. Provide ONLY the final translation without any meta-commentary or explanation:\n\n${text}`
                            }]
                        }],
                        generationConfig: { temperature: 0.2 }
                    })
                });

                if (!response.ok) throw new Error('API通信エラー');

                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text.trim();
                outputText.value = result;

                // 履歴にプッシュ
                addHistoryItem(text, result, sourceLang, targetLang);
                document.getElementById('save-current-btn').classList.remove('saved');
            } catch (err) {
                if (err.name !== 'AbortError') {
                    outputText.value = "翻訳エラーが発生しました。APIキーまたは接続を確認してください。";
                    console.error(err);
                }
            }
        }

        // 言語スワップ
        document.getElementById('swap-lang-btn').addEventListener('click', () => {
            const src = document.getElementById('source-lang');
            const tgt = document.getElementById('target-lang');
            const tmp = src.value;
            src.value = tgt.value;
            tgt.value = tmp;
            executeTranslation();
        });

        // --- 履歴と保存システム ---
        function addHistoryItem(original, translated, from, to) {
            if(state.history.length > 0 && state.history[0].original === original) return;
            state.history.unshift({ original, translated, from, to, time: new Date().toLocaleTimeString() });
            if(state.history.length > 30) state.history.pop();
            localStorage.setItem('trans_history', JSON.stringify(state.history));
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = state.history.length === 0 ? '<p style="color:var(--text-muted)">履歴はありません</p>' : '';
            state.history.forEach(item => {
                container.innerHTML += `
                    <div class="list-item">
                        <div class="meta">${item.from} → ${item.to} (${item.time})</div>
                        <div class="original">${item.original}</div>
                        <div class="translated">${item.translated}</div>
                    </div>
                `;
            });
        }

        document.getElementById('save-current-btn').addEventListener('click', () => {
            const orig = inputText.value.trim();
            const trans = outputText.value.trim();
            if(!orig || !trans) return;

            const isSaved = state.saved.some(s => s.original === orig);
            if(!isSaved) {
                state.saved.unshift({ original: orig, translated: trans, from: document.getElementById('source-lang').value, to: document.getElementById('target-lang').value });
                localStorage.setItem('trans_saved', JSON.stringify(state.saved));
                document.getElementById('save-current-btn').classList.add('saved');
            }
        });

        function renderSaved() {
            const container = document.getElementById('saved-list');
            container.innerHTML = state.saved.length === 0 ? '<p style="color:var(--text-muted)">保存されたアイテムはありません</p>' : '';
            state.saved.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div class="meta">${item.from} → ${item.to} <i class="fa-solid fa-trash" style="float:right; cursor:pointer;" onclick="deleteSaved(${index})"></i></div>
                    <div class="original">${item.original}</div>
                    <div class="translated">${item.translated}</div>
                `;
                container.appendChild(div);
            });
        }

        window.deleteSaved = function(index) {
            state.saved.splice(index, 1);
            localStorage.setItem('trans_saved', JSON.stringify(state.saved));
            renderSaved();
        };

        // --- 右下配置：AIチャットシステム ---
        const chatTrigger = document.getElementById('chat-trigger');
        const chatWindow = document.getElementById('chat-window');
        const closeChat = document.getElementById('close-chat');
        const chatSendBtn = document.getElementById('chat-send-btn');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');

        chatTrigger.addEventListener('click', () => chatWindow.classList.toggle('open'));
        closeChat.addEventListener('click', () => chatWindow.classList.remove('open'));

        chatSendBtn.addEventListener('click', sendChatMessage);
        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChatMessage(); });

        async function sendChatMessage() {
            const msg = chatInput.value.trim();
            if(!msg) return;

            appendMsg(msg, 'user');
            chatInput.value = '';

            if(!state.apiKey) {
                appendMsg('APIキーが設定されていません。設定画面で登録してください。', 'ai');
                return;
            }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${state.apiKey}`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: msg }] }] })
                });
                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                appendMsg(reply, 'ai');
            } catch {
                appendMsg('おっと、応答の取得中にエラーが発生しました。', 'ai');
            }
        }

        function appendMsg(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
